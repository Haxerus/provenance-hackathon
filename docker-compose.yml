services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./registry:/app/registry:ro
      - ./private_keys:/app/private_keys:ro
      - ./reference_lib:/app/reference_lib:ro
      - ./training_corpus.jsonl:/app/training_corpus.jsonl:ro
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
